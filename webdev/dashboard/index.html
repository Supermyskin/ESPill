<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ESPill</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="./icon.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../main/responsive.css">
    <script src="https://kit.fontawesome.com/1424a6b21b.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="header">
        <a href="../landing/index.html" class="header-logo"><i class="fa-solid fa-capsules"></i> ESPill</a>
        <div class="header-links">
            <a href="../dashboard/index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="../about/index.html"><i class="fa-solid fa-circle-info"></i> About</a>
            <a href="../schedule/index.html"><i class="fa-solid fa-calendar"></i> Schedule</a>
        </div>
        <div class="header-account">
            <a href="../login/index.html" id="header-account-link"><i class="fa-solid fa-user"></i> Account</a>
        </div>
        <button class="header-toggle" id="header-toggle"><i class="fa-solid fa-bars"></i></button>
    </div>

    <div class="container">
        <!-- Alert Section (Top Priority) -->
        <div id="alert-message" class="hidden alert-banner">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>PLEASE TAKE YOUR PILL!</span>
        </div>
        <div id="timer-container" class="hidden timer-banner">
            <p>Time remaining: <span id="timer">05:00</span></p>
        </div>

        <div class="dashboard-grid">
            <div class="glass-card status-card">
                <h3><i class="fa-solid fa-signal"></i> System Status</h3>
                <h1 id="status-title">System Status</h1>
                <p id="status-text">Connecting...</p>
            </div>

            <div id="next-pill-container" class="glass-card pill-card">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Next Pill</h3>
                <div id="next-pill-details">
                    <p id="next-pill-time">Loading...</p>
                    <p id="next-pill-info"></p>
                </div>
            </div>

            <div class="glass-card streak-card">
                <h3><i class="fa-solid fa-fire"></i> Adherence Streak</h3>
                <div class="streak-display">
                    <span id="streak-count">0</span>
                    <p>Day Streak</p>
                </div>
            </div>

            <div class="glass-card log-card">
                <h3><i class="fa-solid fa-list-check"></i> Recent Activity</h3>
                <div id="dose-log" class="log-container">
                    <p style="text-align: center; color: rgba(255,255,255,0.4);">Loading history...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../main/auth.js"></script>
    <script src="index.js"></script>
</body>

</html>
