<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ESPill</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="./icon.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../main/responsive.css">
    <script src="https://kit.fontawesome.com/1424a6b21b.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="header">
        <a href="../landing/index.html" class="header-logo"><i class="fa-solid fa-capsules"></i> ESPill</a>
        <div class="header-links">
            <a href="../dashboard/index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="../about/index.html"><i class="fa-solid fa-circle-info"></i> About</a>
            <a href="../schedule/index.html"><i class="fa-solid fa-calendar"></i> Schedule</a>
        </div>
        <div class="header-account">
            <a href="../login/index.html" id="header-account-link"><i class="fa-solid fa-user"></i> Account</a>
        </div>
        <button class="header-toggle" id="header-toggle"><i class="fa-solid fa-bars"></i></button>
    </div>


    <div class="window_border glass-card">

        <h1 class="login-title">Login</h1>

        <form class="login-form">
            <input id="email_input" type="email" placeholder="Email" class="login-input" required>
            <input id="password" type="password" placeholder="Password" class="login-input" required>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <a href="../register/index.html" class="register-link">Register</a>

    </div>

    <script src="../main/auth.js"></script>
    <script src="index.js"></script>

</body>

</html>
