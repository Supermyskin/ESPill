<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | ESPill</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="./icon.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../main/responsive.css">
    <script src="https://kit.fontawesome.com/1424a6b21b.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="header">
        <a href="../landing/index.html" class="header-logo"><i class="fa-solid fa-capsules"></i> ESPill</a>
        <div class="header-links">
            <a href="../dashboard/index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="../about/index.html"><i class="fa-solid fa-circle-info"></i> About</a>
            <a href="../schedule/index.html"><i class="fa-solid fa-calendar"></i> Schedule</a>
        </div>
        <div class="header-account">
            <a href="../login/index.html" id="header-account-link"><i class="fa-solid fa-user"></i> Account</a>
        </div>
        <button class="header-toggle" id="header-toggle"><i class="fa-solid fa-bars"></i></button>
    </div>

    <h1>Schedule your <span style="color: rgb(254, 177, 255);">pills.</span></h1>

    <div class="container">
        <div class="day-card" data-day="2">
            <a href="./weekdays/monday.html">
                <span class="day-name">Monday</span>
                <span class="day-summary">Loading...</span>
            </a>
        </div>
        <div class="day-card" data-day="3">
            <a href="./weekdays/tuesday.html">
                <span class="day-name">Tuesday</span>
                <span class="day-summary">Loading...</span>
            </a>
        </div>
        <div class="day-card" data-day="4">
            <a href="./weekdays/wednesday.html">
                <span class="day-name">Wednesday</span>
                <span class="day-summary">Loading...</span>
            </a>
        </div>
        <div class="day-card" data-day="5">
            <a href="./weekdays/thursday.html">
                <span class="day-name">Thursday</span>
                <span class="day-summary">Loading...</span>
            </a>
        </div>
        <div class="day-card" data-day="6">
            <a href="./weekdays/friday.html">
                <span class="day-name">Friday</span>
                <span class="day-summary">Loading...</span>
            </a>
        </div>
        <div class="day-card" data-day="0">
            <a href="./weekdays/saturday.html">
                <span class="day-name">Saturday</span>
                <span class="day-summary">Loading...</span>
            </a>
        </div>
        <div class="day-card" data-day="1">
            <a href="./weekdays/sunday.html">
                <span class="day-name">Sunday</span>
                <span class="day-summary">Loading...</span>
            </a>
        </div>
    </div>

    <div class="button-group">
        <button id="send-schedule-btn" class="send-btn" onclick="uploadToESP()">Send Schedule to ESP32</button>
        <button id="clear-schedule-btn" class="clear-btn" onclick="clearSchedule()">Clear Schedule</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
    <script src="../main/auth.js"></script>
    <script src="index.js"></script>

</body>

</html>
