<!DOCTYPE html>
<html>

<head>
    <title>ESPill</title>
    <link href="../icon.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1424a6b21b.js" crossorigin="anonymous"></script>
</head>

<body>

    <p hidden id="weekday" weekday-num="6"></p>

    <div class="header">
        <a href="../dashboard/index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <a href="../about/index.html"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="../schedule/index.html"><i class="fa-solid fa-calendar"></i> Schedule</a>
        <a href="../landing/index.html" class="header-logo"><i class="fa-solid fa-capsules"></i> ESPill</a>
    </div>

    <div class="schedule-container">

        <div class="input-row">
            <div class="input-group">
                <label>Hour</label>
                <input type="number" id="hour-input" min="0" max="23" placeholder="12">
            </div>
            <div class="input-group">
                <label>Minutes</label>
                <input type="number" id="minute-input" min="0" max="59" placeholder="30">
            </div>

            <div class="input-group">
                <label>Pick Boxes</label>
                <div class="box-selector">
                    <button class="box-btn" data-box="1">1</button>
                    <button class="box-btn" data-box="2">2</button>
                    <button class="box-btn" data-box="3">3</button>
                    <button class="box-btn" data-box="4">4</button>
                    <button class="box-btn" data-box="5">5</button>
                    <button class="box-btn" data-box="6">6</button>
                </div>
            </div>

            <button class="add-btn" onclick="addToJSON(6)">Add</button>
        </div>

        <div id="schedule-list"></div>

    </div>

    <script src="index.js"></script>
</body>

</html>
